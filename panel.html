<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Panel People · Humanitas</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }

  /* ── LOGIN ── */
  #login-view { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .login-card { background: #fff; border: 1px solid #e8e8e4; border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; }
  .login-card .logo { width: 40px; height: 40px; background: #534AB7; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 18px; margin-bottom: 20px; }
  .login-card h2 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .login-card p { font-size: 14px; color: #666; margin-bottom: 28px; }
  .login-card label { display: block; font-size: 13px; font-weight: 500; color: #444; margin-bottom: 8px; }
  .login-card input { width: 100%; padding: 11px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; margin-bottom: 16px; background: #fafafa; }
  .login-card input:focus { border-color: #534AB7; background: #fff; }
  .login-card button { width: 100%; padding: 13px; background: #534AB7; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; }
  .login-card button:hover { background: #3C3489; }
  .login-error { display: none; color: #A32D2D; font-size: 13px; margin-top: 10px; text-align: center; }

  /* ── PANEL ── */
  #panel-view { display: none; }
  #panel-view.visible { display: block; }

  header { background: #fff; border-bottom: 1px solid #e8e8e4; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo-sm { width: 32px; height: 32px; background: #534AB7; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 14px; }
  header h1 { font-size: 16px; font-weight: 500; }
  header span { font-size: 13px; color: #888; }
  .logout-btn { font-size: 13px; color: #888; background: none; border: none; cursor: pointer; padding: 6px 12px; border-radius: 6px; }
  .logout-btn:hover { background: #f0f0ec; color: #444; }

  main { max-width: 900px; margin: 32px auto; padding: 0 20px; }

  /* ── LOADING STATE ── */
  .panel-loading { text-align: center; padding: 60px 0; color: #888; font-size: 14px; }
  .panel-spinner { width: 32px; height: 32px; border: 3px solid #EEEDFE; border-top-color: #534AB7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── STATS ── */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 28px; }
  .stat { border-radius: 10px; padding: 16px 20px; background: var(--bg); }
  .stat .num { font-size: 28px; font-weight: 600; color: var(--col); }
  .stat .lbl { font-size: 12px; color: #888; margin-top: 2px; }

  /* ── ALERT BANNER ── */
  .alert-banner { background: #FCEBEB; border: 1px solid #F09595; border-radius: 10px; padding: 14px 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
  .alert-dot { width: 10px; height: 10px; background: #E24B4A; border-radius: 50%; flex-shrink: 0; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .alert-banner p { font-size: 14px; color: #A32D2D; }

  /* ── TABS ── */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid #e8e8e4; }
  .tab { padding: 10px 20px; font-size: 14px; color: #888; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; user-select: none; }
  .tab.active { color: #534AB7; border-bottom-color: #534AB7; font-weight: 500; }
  .tab:hover:not(.active) { color: #534AB7; }

  /* ── GRUPOS GRID ── */
  .grupos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
  .grupo-card { background: #fff; border: 1px solid #e8e8e4; border-radius: 12px; padding: 20px; }
  .grupo-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .grupo-titulo { font-size: 15px; font-weight: 500; }
  .badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .badge-ok   { background: #E1F5EE; color: #085041; }
  .badge-warn { background: #FAEEDA; color: #633806; }
  .badge-alert{ background: #FCEBEB; color: #A32D2D; }
  .grupo-info { font-size: 12px; color: #888; margin-bottom: 12px; }

  .miembros-lista { display: block; width: 100%; }
  .miembro { display: grid; grid-template-columns: 32px 1fr auto; align-items: center; gap: 10px; padding: 10px 0; border-top: 1px solid #f0f0ec; width: 100%; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: #EEEDFE; color: #534AB7; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .miembro-info { flex: 1; min-width: 0; }
  .miembro-nombre { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .miembro-zona { font-size: 11px; color: #aaa; }

  /* ── ALERTAS ── */
  .alertas-list { display: flex; flex-direction: column; gap: 12px; }
  .alerta-item { background: #fff; border: 1px solid #F09595; border-radius: 10px; padding: 18px 20px; display: flex; align-items: center; gap: 16px; }
  .alerta-avatar { width: 40px; height: 40px; border-radius: 50%; background: #FCEBEB; color: #E24B4A; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; }
  .alerta-info { flex: 1; min-width: 0; }
  .alerta-nombre { font-size: 15px; font-weight: 500; margin-bottom: 3px; }
  .alerta-detalle { font-size: 13px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .alerta-badge { font-size: 12px; font-weight: 500; padding: 5px 14px; border-radius: 20px; background: #FCEBEB; color: #A32D2D; white-space: nowrap; flex-shrink: 0; }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; padding: 48px; color: #aaa; font-size: 14px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-view">
  <div class="login-card">
    <div class="logo">H</div>
    <h2>Panel de People</h2>
    <p>Acceso exclusivo para el equipo de People de Humanitas.</p>
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()"/>
    <button onclick="login()">Ingresar</button>
    <div class="login-error" id="login-error">Contraseña incorrecta. Intentá de nuevo.</div>
  </div>
</div>

<!-- PANEL -->
<div id="panel-view">
  <header>
    <div class="header-left">
      <div class="logo-sm">H</div>
      <h1>Panel de People <span>· Clases de idiomas</span></h1>
    </div>
    <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
  </header>
  <main>
    <div id="panel-content">
      <div class="panel-loading">
        <div class="panel-spinner"></div>
        Cargando datos...
      </div>
    </div>
  </main>
</div>

<script>
const PASSWORD   = "people2024";
const SHEETY_URL = "https://api.sheety.co/782c0e1ef97d36c7932073da8a8a8954/sistemaClasesIdiomas";

function login() {
  if (document.getElementById("password").value === PASSWORD) {
    document.getElementById("login-view").style.display = "none";
    document.getElementById("panel-view").classList.add("visible");
    cargarDatos();
  } else {
    document.getElementById("login-error").style.display = "block";
  }
}

function logout() {
  document.getElementById("panel-view").classList.remove("visible");
  document.getElementById("login-view").style.display = "flex";
  document.getElementById("password").value = "";
}

function switchTab(tab, el) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("tab-grupos").style.display  = tab === "grupos"  ? "block" : "none";
  document.getElementById("tab-alertas").style.display = tab === "alertas" ? "block" : "none";
}

function initials(n) {
  return (n || "?").split(" ").map(p => p[0]).slice(0, 2).join("").toUpperCase();
}

async function cargarDatos() {
  try {
    // Leer grupos e inscriptos desde Sheety en paralelo
    const [gruposRes, inscriptosRes, alertasRes] = await Promise.all([
      fetch(`${SHEETY_URL}/grupos`),
      fetch(`${SHEETY_URL}/formResponses1`),
      fetch("/api/attendance")
    ]);

    const gruposData     = gruposRes.ok     ? await gruposRes.json()     : { grupos: [] };
    const inscriptosData = inscriptosRes.ok ? await inscriptosRes.json() : { formResponses1: [] };
    const alertasData    = alertasRes.ok    ? await alertasRes.json()    : { alertas: [] };

    const filas      = gruposData.grupos             || [];
    const inscriptos = inscriptosData.formResponses1 || [];
    const alertas    = alertasData.alertas           || [];

    // Cada fila ES un grupo, miembros es string "Nombre1, Nombre2"
    const nombresConAlerta = new Set(alertas.map(a => a.nombre));
    const grupos = filas.map(g => {
      const listaMiembros = (g.miembros || "").split(",").map(m => m.trim()).filter(Boolean);
      const tieneAlerta   = listaMiembros.some(m => nombresConAlerta.has(m));
      return {
        grupoNumero:     g.grupoNumero,
        idioma:          g.idioma,
        nivel:           g.nivel,
        horarioSugerido: g.horarioSugerido,
        estado:          tieneAlerta ? "alerta" : (g.estado || "ok"),
        miembros:        listaMiembros
      };
    });

    renderPanel(grupos, inscriptos, alertas);

  } catch (e) {
    console.error("Error cargando datos:", e);
    document.getElementById("panel-content").innerHTML =
      `<div class="empty">Error al cargar los datos. Intentá recargar la página.</div>`;
  }
}

function renderPanel(grupos, inscriptos, alertas) {
  const totalMiembros = inscriptos.length;
  const totalAlertas  = alertas.length;

  document.getElementById("panel-content").innerHTML = `
    <div class="stats" id="stats-row"></div>
    <div class="alert-banner" id="alert-banner" style="display:none">
      <div class="alert-dot"></div>
      <p id="alert-text"></p>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('grupos',this)">Grupos</div>
      <div class="tab" onclick="switchTab('alertas',this)">Alertas</div>
    </div>
    <div id="tab-grupos"><div class="grupos-grid" id="grupos-grid"></div></div>
    <div id="tab-alertas" style="display:none"><div class="alertas-list" id="alertas-list"></div></div>
  `;

  // Stats
  document.getElementById("stats-row").innerHTML = `
    <div class="stat" style="--bg:#EEEDFE;--col:#534AB7"><div class="num">${grupos.length}</div><div class="lbl">Grupos activos</div></div>
    <div class="stat" style="--bg:#E1F5EE;--col:#0F6E56"><div class="num">${totalMiembros}</div><div class="lbl">Humanders inscriptos</div></div>
    <div class="stat" style="--bg:#FCEBEB;--col:#E24B4A"><div class="num">${totalAlertas}</div><div class="lbl">Alertas activas</div></div>`;

  // Banner de alerta
  if (totalAlertas > 0) {
    document.getElementById("alert-banner").style.display = "flex";
    document.getElementById("alert-text").innerHTML =
      `<strong>${totalAlertas} ${totalAlertas === 1 ? "Humander" : "Humanders"}</strong> superaron el umbral de ausencias consecutivas. Revisá la pestaña Alertas.`;
  }

  // Grupos
  if (grupos.length === 0) {
    document.getElementById("grupos-grid").innerHTML =
      `<div class="empty">Aún no hay grupos formados. Los grupos se crean cuando los participantes se inscriben.</div>`;
  } else {
    document.getElementById("grupos-grid").innerHTML = grupos.map(g => `
      <div class="grupo-card">
        <div class="grupo-header">
          <div class="grupo-titulo">Grupo ${g.grupoNumero} · ${g.idioma}</div>
          <span class="badge badge-${g.estado}">${g.estado === "ok" ? "Sin alertas" : "Alerta"}</span>
        </div>
        <div class="grupo-info">${g.nivel} · ${g.horarioSugerido || "—"}</div>
        <div class="miembros-lista">
          ${g.miembros.map(nombre => `
            <div class="miembro">
              <div class="avatar">${initials(nombre)}</div>
              <div class="miembro-info">
                <div class="miembro-nombre">${nombre}</div>
              </div>
            </div>`).join("")}
        </div>
      </div>`).join("");
  }

  // Alertas
  if (alertas.length === 0) {
    document.getElementById("alertas-list").innerHTML =
      `<div class="empty">Sin alertas activas. Todos los participantes tienen buena asistencia.</div>`;
  } else {
    document.getElementById("alertas-list").innerHTML = alertas.map(a => `
      <div class="alerta-item">
        <div class="alerta-avatar">${initials(a.nombre)}</div>
        <div class="alerta-info">
          <div class="alerta-nombre">${a.nombre}</div>
          <div class="alerta-detalle">Grupo ${a.grupoNumero} · ${a.email}</div>
        </div>
        <div class="alerta-badge">⚠ ${a.ausenciasConsecutivas} ausencias seguidas</div>
      </div>`).join("");
  }
}
</script>
</body>
</html>
