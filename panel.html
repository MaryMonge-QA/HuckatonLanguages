<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Panel People · Humanitas</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }

  /* LOGIN */
  #login-view { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .login-card { background: #fff; border: 1px solid #e8e8e4; border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; }
  .login-card .logo { width: 40px; height: 40px; background: #534AB7; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 18px; margin-bottom: 20px; }
  .login-card h2 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .login-card p { font-size: 14px; color: #666; margin-bottom: 28px; }
  .login-card label { display: block; font-size: 13px; font-weight: 500; color: #444; margin-bottom: 8px; }
  .login-card input { width: 100%; padding: 11px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; margin-bottom: 16px; background: #fafafa; }
  .login-card input:focus { border-color: #534AB7; background: #fff; }
  .login-card button { width: 100%; padding: 13px; background: #534AB7; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; }
  .login-card button:hover { background: #3C3489; }
  .login-error { display: none; color: #A32D2D; font-size: 13px; margin-top: 10px; text-align: center; }

  /* PANEL */
  #panel-view { display: none; }
  #panel-view.visible { display: block; }
  header { background: #fff; border-bottom: 1px solid #e8e8e4; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo-sm { width: 32px; height: 32px; background: #534AB7; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 14px; }
  header h1 { font-size: 16px; font-weight: 500; }
  header span { font-size: 13px; color: #888; }
  .logout-btn { font-size: 13px; color: #888; background: none; border: none; cursor: pointer; padding: 6px 12px; border-radius: 6px; }
  .logout-btn:hover { background: #f0f0ec; color: #444; }
  main { max-width: 960px; margin: 28px auto; padding: 0 20px; }

  /* GENERAR GRUPOS */
  .generar-btn { display: inline-flex; align-items: center; gap: 8px; background: #534AB7; color: #fff; border: none; border-radius: 10px; padding: 11px 20px; font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 24px; transition: background 0.15s; }
  .generar-btn:hover:not(:disabled) { background: #3C3489; }
  .generar-btn:disabled { background: #a8a4d8; cursor: not-allowed; }
  .spin { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat { border-radius: 10px; padding: 16px 20px; background: var(--bg); }
  .stat .num { font-size: 28px; font-weight: 600; color: var(--col); }
  .stat .lbl { font-size: 12px; color: #888; margin-top: 2px; }

  /* ALERT BANNER */
  .alert-banner { background: #FCEBEB; border: 1px solid #F09595; border-radius: 10px; padding: 14px 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
  .alert-dot { width: 10px; height: 10px; background: #E24B4A; border-radius: 50%; flex-shrink: 0; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
  .alert-banner p { font-size: 14px; color: #A32D2D; }

  /* TABS */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid #e8e8e4; overflow-x: auto; }
  .tab { padding: 10px 18px; font-size: 14px; color: #888; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; user-select: none; white-space: nowrap; }
  .tab.active { color: #534AB7; border-bottom-color: #534AB7; font-weight: 500; }
  .tab:hover:not(.active) { color: #534AB7; }

  /* GRUPOS */
  .grupos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
  .grupo-card { background: #fff; border: 1px solid #e8e8e4; border-radius: 12px; padding: 20px; }
  .grupo-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .grupo-titulo { font-size: 15px; font-weight: 500; }
  .badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .badge-ok { background: #E1F5EE; color: #085041; }
  .badge-alerta { background: #FCEBEB; color: #A32D2D; }
  .grupo-info { font-size: 12px; color: #888; margin-bottom: 10px; }
  .miembro-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-top: 1px solid #f0f0ec; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: #EEEDFE; color: #534AB7; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .miembro-nombre { font-size: 13px; }

  /* PASAR LISTA */
  .lista-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .lista-header select { padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; background: #fafafa; min-width: 220px; }
  .lista-header select:focus { border-color: #534AB7; }
  .fecha-info { font-size: 13px; color: #666; background: #f0f0ec; padding: 8px 14px; border-radius: 8px; }
  .contadores { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .contador { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; }
  .cnt-presente { background: #E1F5EE; color: #085041; }
  .cnt-tarde    { background: #FAEEDA; color: #633806; }
  .cnt-ausente  { background: #FCEBEB; color: #A32D2D; }
  .cnt-sin      { background: #f0f0ec; color: #888; }
  .alumno-row { background: #fff; border: 1px solid #e8e8e4; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .alumno-nombre-col { font-size: 14px; font-weight: 500; flex: 1; min-width: 140px; }
  .estatus-btns { display: flex; gap: 6px; }
  .est-btn { padding: 7px 14px; border-radius: 8px; border: 1.5px solid #e0e0e0; background: #fafafa; font-size: 13px; cursor: pointer; transition: all 0.12s; white-space: nowrap; }
  .est-btn:hover { border-color: #7F77DD; }
  .est-btn.activo-presente { background: #E1F5EE; border-color: #0F6E56; color: #085041; font-weight: 500; }
  .est-btn.activo-tarde    { background: #FAEEDA; border-color: #B87333; color: #633806; font-weight: 500; }
  .est-btn.activo-ausente  { background: #FCEBEB; border-color: #E24B4A; color: #A32D2D; font-weight: 500; }
  .guardar-btn { width: 100%; padding: 14px; background: #534AB7; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 12px; transition: background 0.15s; }
  .guardar-btn:hover:not(:disabled) { background: #3C3489; }
  .guardar-btn:disabled { background: #a8a4d8; cursor: not-allowed; }

  /* HISTORIAL */
  .historial-filtros { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .historial-filtros select { padding: 9px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; background: #fafafa; }
  .sesion-card { background: #fff; border: 1px solid #e8e8e4; border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
  .sesion-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; cursor: pointer; user-select: none; }
  .sesion-header:hover { background: #fafaf8; }
  .sesion-titulo { font-size: 14px; font-weight: 500; }
  .sesion-meta { font-size: 12px; color: #888; margin-top: 2px; }
  .sesion-badges { display: flex; gap: 6px; }
  .sesion-body { padding: 0 18px 14px; border-top: 1px solid #f0f0ec; display: none; }
  .sesion-body.open { display: block; }
  .sesion-alumno { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f8f8f6; font-size: 13px; }
  .sesion-alumno:last-child { border-bottom: none; }
  .est-tag { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
  .est-Presente { background: #E1F5EE; color: #085041; }
  .est-Tarde    { background: #FAEEDA; color: #633806; }
  .est-Ausente  { background: #FCEBEB; color: #A32D2D; }
  .stats-alumno-table { margin-top: 20px; background: #fff; border: 1px solid #e8e8e4; border-radius: 12px; overflow: hidden; }
  .stats-alumno-table h4 { padding: 14px 18px; font-size: 14px; font-weight: 600; border-bottom: 1px solid #e8e8e4; }
  .stat-alumno-row { display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 12px; padding: 10px 18px; border-bottom: 1px solid #f0f0ec; }
  .stat-alumno-row:last-child { border-bottom: none; }
  .pct-bar-wrap { width: 80px; height: 6px; background: #e8e8e4; border-radius: 3px; }
  .pct-bar { height: 6px; border-radius: 3px; background: #534AB7; }
  .pct-num { font-size: 12px; font-weight: 600; color: #534AB7; min-width: 36px; text-align: right; }

  /* ALERTAS */
  .alertas-list { display: flex; flex-direction: column; gap: 12px; }
  .alerta-item { background: #fff; border: 1px solid #F09595; border-radius: 10px; padding: 16px 20px; display: flex; align-items: center; gap: 16px; }
  .alerta-avatar { width: 40px; height: 40px; border-radius: 50%; background: #FCEBEB; color: #E24B4A; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; }
  .alerta-info { flex: 1; min-width: 0; }
  .alerta-nombre { font-size: 15px; font-weight: 500; margin-bottom: 2px; }
  .alerta-detalle { font-size: 13px; color: #888; }
  .alerta-badge { font-size: 12px; font-weight: 500; padding: 5px 14px; border-radius: 20px; background: #FCEBEB; color: #A32D2D; white-space: nowrap; flex-shrink: 0; }

  /* DASHBOARD */
  .dash-grupos { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
  .dash-grupo-card { background: #fff; border: 1px solid #e8e8e4; border-radius: 12px; padding: 18px; }
  .dash-grupo-nombre { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .dash-alumno-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .dash-alumno-nombre { font-size: 12px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dash-pct-bar-wrap { width: 60px; height: 5px; background: #e8e8e4; border-radius: 3px; flex-shrink: 0; }
  .dash-pct-bar { height: 5px; border-radius: 3px; }
  .dash-pct-num { font-size: 11px; font-weight: 600; min-width: 28px; text-align: right; flex-shrink: 0; }

  /* LOADING / EMPTY */
  .panel-loading { text-align: center; padding: 60px 0; color: #888; font-size: 14px; }
  .panel-spinner { width: 32px; height: 32px; border: 3px solid #EEEDFE; border-top-color: #534AB7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
  .empty { text-align: center; padding: 48px; color: #aaa; font-size: 14px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-view">
  <div class="login-card">
    <div class="logo">H</div>
    <h2>Panel de People</h2>
    <p>Acceso exclusivo para el equipo de People de Humanitas.</p>
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"/>
    <button onclick="login()">Ingresar</button>
    <div class="login-error" id="login-error">Contraseña incorrecta. Intentá de nuevo.</div>
  </div>
</div>

<!-- PANEL -->
<div id="panel-view">
  <header>
    <div class="header-left">
      <div class="logo-sm">H</div>
      <h1>Panel de People <span>· Clases de idiomas</span></h1>
    </div>
    <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
  </header>
  <main id="main-content">
    <div class="panel-loading"><div class="panel-spinner"></div>Cargando...</div>
  </main>
</div>

<script>
const PASSWORD   = "people2024";
const SHEETY_URL = "https://api.sheety.co/782c0e1ef97d36c7932073da8a8a8954/sistemaClasesIdiomas";

let state = { grupos: [], inscriptos: [], asistencia: [], alertas: [] };
let sesion = { grupoNumero: null, miembros: [], marcas: {} };

// ── AUTH ──────────────────────────────────────────────
function login() {
  if (document.getElementById("password").value === PASSWORD) {
    document.getElementById("login-view").style.display = "none";
    document.getElementById("panel-view").classList.add("visible");
    cargarDatos();
  } else {
    document.getElementById("login-error").style.display = "block";
  }
}
function logout() {
  document.getElementById("panel-view").classList.remove("visible");
  document.getElementById("login-view").style.display = "flex";
  document.getElementById("password").value = "";
}

// ── TABS ─────────────────────────────────────────────
function switchTab(tab, el) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  ["dashboard","grupos","lista","historial","alertas"].forEach(t => {
    const el = document.getElementById("tab-" + t);
    if (el) el.style.display = t === tab ? "block" : "none";
  });
}

// ── UTILS ─────────────────────────────────────────────
function initials(n) { return (n||"?").split(" ").map(p=>p[0]).slice(0,2).join("").toUpperCase(); }
function fechaHoy() {
  return new Date().toLocaleDateString("es-AR", { weekday:"long", day:"numeric", month:"long", year:"numeric" });
}
function horaAhora() {
  return new Date().toLocaleTimeString("es-AR", { hour:"2-digit", minute:"2-digit" });
}

// ── CARGAR DATOS ──────────────────────────────────────
async function cargarDatos() {
  try {
    const [gRes, iRes, aRes, alRes] = await Promise.all([
      fetch(`${SHEETY_URL}/grupos`),
      fetch(`${SHEETY_URL}/formResponses1`),
      fetch(`${SHEETY_URL}/asistencia`),
      fetch("/api/attendance")
    ]);

    state.grupos      = gRes.ok  ? (await gRes.json()).grupos          || [] : [];
    state.inscriptos  = iRes.ok  ? (await iRes.json()).formResponses1  || [] : [];
    state.asistencia  = aRes.ok  ? (await aRes.json()).asistencia      || [] : [];
    state.alertas     = alRes.ok ? (await alRes.json()).alertas        || [] : [];

    renderPanel();
  } catch(e) {
    console.error(e);
    document.getElementById("main-content").innerHTML =
      `<div class="empty">Error al cargar los datos. Recargá la página.</div>`;
  }
}

// ── RENDER PRINCIPAL ──────────────────────────────────
function renderPanel() {
  const totalInscriptos = state.inscriptos.length;
  const totalAlertas    = state.alertas.length;
  const totalGrupos     = state.grupos.length;

  // Calcular promedio de asistencia global
  let pctGlobal = 0;
  if (state.asistencia.length > 0) {
    const presentes = state.asistencia.filter(r => r.estatus === "Presente" || r.estatus === "Tarde").length;
    pctGlobal = Math.round(presentes / state.asistencia.length * 100);
  }

  document.getElementById("main-content").innerHTML = `
    <button class="generar-btn" id="generar-btn" onclick="generarGrupos()">
      <div class="spin" id="gen-spin"></div>
      ✦ Generar grupos con IA
    </button>

    <div class="stats">
      <div class="stat" style="--bg:#EEEDFE;--col:#534AB7"><div class="num">${totalInscriptos}</div><div class="lbl">Inscriptos</div></div>
      <div class="stat" style="--bg:#E1F5EE;--col:#0F6E56"><div class="num">${totalGrupos}</div><div class="lbl">Grupos activos</div></div>
      <div class="stat" style="--bg:#dbeafe;--col:#1d4ed8"><div class="num">${pctGlobal}%</div><div class="lbl">Asistencia promedio</div></div>
      <div class="stat" style="--bg:#FCEBEB;--col:#E24B4A"><div class="num">${totalAlertas}</div><div class="lbl">Alertas activas</div></div>
    </div>

    ${totalAlertas > 0 ? `
    <div class="alert-banner">
      <div class="alert-dot"></div>
      <p><strong>${totalAlertas} ${totalAlertas===1?"Humander":"Humanders"}</strong> superaron el umbral de ausencias. Revisá la pestaña Alertas.</p>
    </div>` : ""}

    <div class="tabs">
      <div class="tab active" onclick="switchTab('dashboard',this)">Dashboard</div>
      <div class="tab" onclick="switchTab('grupos',this)">Grupos</div>
      <div class="tab" onclick="switchTab('lista',this)">Pasar Lista</div>
      <div class="tab" onclick="switchTab('historial',this)">Historial</div>
      <div class="tab" onclick="switchTab('alertas',this)">Alertas</div>
    </div>

    <div id="tab-dashboard"></div>
    <div id="tab-grupos"    style="display:none"></div>
    <div id="tab-lista"     style="display:none"></div>
    <div id="tab-historial" style="display:none"></div>
    <div id="tab-alertas"   style="display:none"></div>
  `;

  renderDashboard();
  renderGrupos();
  renderLista();
  renderHistorial();
  renderAlertas();
}

// ── DASHBOARD ─────────────────────────────────────────
function renderDashboard() {
  if (state.grupos.length === 0) {
    document.getElementById("tab-dashboard").innerHTML =
      `<div class="empty">Generá los grupos primero para ver el dashboard.</div>`;
    return;
  }

  const html = state.grupos.map(g => {
    const miembros = (g.miembros||"").split(",").map(m=>m.trim()).filter(Boolean);
    const asistGrupo = state.asistencia.filter(r => String(r.grupoNumero) === String(g.ngrupoNumero));

    const rows = miembros.map(nombre => {
      const registros = asistGrupo.filter(r => r.nombre === nombre);
      const total     = registros.length;
      const presentes = registros.filter(r => r.estatus==="Presente"||r.estatus==="Tarde").length;
      const pct       = total > 0 ? Math.round(presentes/total*100) : null;
      const color     = pct === null ? "#aaa" : pct >= 80 ? "#0F6E56" : pct >= 60 ? "#B87333" : "#E24B4A";
      return `
        <div class="dash-alumno-row">
          <div class="dash-alumno-nombre">${nombre}</div>
          <div class="dash-pct-bar-wrap"><div class="dash-pct-bar" style="width:${pct??0}%;background:${color}"></div></div>
          <div class="dash-pct-num" style="color:${color}">${pct!==null?pct+"%":"—"}</div>
        </div>`;
    }).join("");

    return `
      <div class="dash-grupo-card">
        <div class="dash-grupo-nombre">Grupo ${g.ngrupoNumero} · ${g.idioma} ${g.nivel}</div>
        ${rows || `<div style="font-size:12px;color:#aaa">Sin datos de asistencia</div>`}
      </div>`;
  }).join("");

  document.getElementById("tab-dashboard").innerHTML = `<div class="dash-grupos">${html}</div>`;
}

// ── GRUPOS ────────────────────────────────────────────
function renderGrupos() {
  if (state.grupos.length === 0) {
    document.getElementById("tab-grupos").innerHTML =
      `<div class="empty">No hay grupos formados aún. Usá el botón "Generar grupos con IA".</div>`;
    return;
  }

  const nombresAlerta = new Set(state.alertas.map(a=>a.nombre));
  const html = state.grupos.map(g => {
    const miembros = (g.miembros||"").split(",").map(m=>m.trim()).filter(Boolean);
    const tieneAlerta = miembros.some(m=>nombresAlerta.has(m));
    return `
      <div class="grupo-card">
        <div class="grupo-header">
          <div class="grupo-titulo">Grupo ${g.ngrupoNumero} · ${g.idioma}</div>
          <span class="badge badge-${tieneAlerta?"alerta":"ok"}">${tieneAlerta?"Alerta":"Sin alertas"}</span>
        </div>
        <div class="grupo-info">${g.nivel} · ${g.horarioSugerido||"—"}</div>
        ${miembros.map(nombre=>`
          <div class="miembro-row">
            <div class="avatar">${initials(nombre)}</div>
            <div class="miembro-nombre">${nombre}</div>
          </div>`).join("")}
      </div>`;
  }).join("");

  document.getElementById("tab-grupos").innerHTML = `<div class="grupos-grid">${html}</div>`;
}

// ── PASAR LISTA ───────────────────────────────────────
function renderLista() {
  const hoy = new Date().toISOString().split("T")[0];

  // Grupos que ya tienen asistencia registrada para la fecha seleccionada
  const fechaActual = sesion.fecha || hoy;
  const gruposYaTomados = new Set(
    state.asistencia
      .filter(r => r.fecha === fechaActual || r.fecha === fechaActual.split("-").reverse().join("/"))
      .map(r => String(r.grupoNumero))
  );

  const opciones = state.grupos.length === 0
    ? `<option value="">— Primero generá grupos —</option>`
    : `<option value="">Seleccioná un grupo</option>` +
      state.grupos
        .filter(g => !gruposYaTomados.has(String(g.ngrupoNumero)))
        .map(g => `<option value="${g.ngrupoNumero}">Grupo ${g.ngrupoNumero} · ${g.idioma} ${g.nivel}</option>`)
        .join("");

  document.getElementById("tab-lista").innerHTML = `
    <div class="lista-header">
      <select id="grupo-select" onchange="selectGrupo(this.value)">${opciones}</select>
      <input type="date" id="fecha-picker" value="${hoy}" onchange="onFechaChange(this.value)" style="padding:9px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;background:#fafafa;">
    </div>
    <div id="lista-content"></div>`;
}

function onFechaChange(fecha) {
  sesion.fecha = fecha;
  renderLista();
}

function selectGrupo(grupoNumero) {
  if (!grupoNumero) { document.getElementById("lista-content").innerHTML = ""; return; }

  const grupo = state.grupos.find(g => String(g.ngrupoNumero) === String(grupoNumero));
  if (!grupo) return;

  const miembros = (grupo.miembros||"").split(",").map(m=>m.trim()).filter(Boolean);
  sesion = { grupoNumero, miembros, marcas: {} };

  actualizarVista();
}

function setEstatus(nombre, estatus) {
  sesion.marcas[nombre] = estatus;
  actualizarVista();
}

function actualizarVista() {
  const { miembros, marcas } = sesion;
  const cnts = { Presente:0, Tarde:0, Ausente:0, sin:0 };
  miembros.forEach(n => {
    if (marcas[n]) cnts[marcas[n]]++;
    else cnts.sin++;
  });

  const total = miembros.length;
  const marcados = total - cnts.sin;
  const todosListo = cnts.sin === 0;

  const rows = miembros.map(nombre => {
    const est = marcas[nombre];
    return `
      <div class="alumno-row">
        <div class="avatar">${initials(nombre)}</div>
        <div class="alumno-nombre-col">${nombre}</div>
        <div class="estatus-btns">
          <button class="est-btn ${est==="Presente"?"activo-presente":""}" onclick="setEstatus('${nombre.replace(/'/g,"\\'")}','Presente')">✓ Presente</button>
          <button class="est-btn ${est==="Tarde"?"activo-tarde":""}"    onclick="setEstatus('${nombre.replace(/'/g,"\\'")}','Tarde')">⏱ Tarde</button>
          <button class="est-btn ${est==="Ausente"?"activo-ausente":""}" onclick="setEstatus('${nombre.replace(/'/g,"\\'")}','Ausente')">✗ Ausente</button>
        </div>
      </div>`;
  }).join("");

  document.getElementById("lista-content").innerHTML = `
    <div class="contadores">
      <div class="contador cnt-presente">✓ Presentes: ${cnts.Presente} (${total?Math.round(cnts.Presente/total*100):0}%)</div>
      <div class="contador cnt-tarde">⏱ Tardes: ${cnts.Tarde}</div>
      <div class="contador cnt-ausente">✗ Ausentes: ${cnts.Ausente}</div>
      ${cnts.sin > 0 ? `<div class="contador cnt-sin">Sin marcar: ${cnts.sin}</div>` : ""}
    </div>
    ${rows}
    <button class="guardar-btn" id="guardar-btn" onclick="guardarSesion()" ${!todosListo?"disabled":""}>
      ${todosListo ? "Guardar sesión →" : `Marcá todos los alumnos (${marcados}/${total})`}
    </button>`;
}

async function guardarSesion() {
  const btn = document.getElementById("guardar-btn");
  btn.disabled = true;
  btn.textContent = "Guardando...";

  const fechaPicker = document.getElementById("fecha-picker")?.value;
  const fecha  = fechaPicker || new Date().toISOString().split("T")[0];
  const alumnos = sesion.miembros.map(n => ({ nombre: n, estatus: sesion.marcas[n] }));

  try {
    const res = await fetch("/api/save-attendance", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ grupoNumero: sesion.grupoNumero, fecha, alumnos })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    // Recargar asistencia y volver al historial
    const aRes = await fetch(`${SHEETY_URL}/asistencia`);
    state.asistencia = aRes.ok ? (await aRes.json()).asistencia || [] : [];

    renderDashboard();
    renderHistorial();

    // Limpiar sesión y mostrar confirmación
    sesion = { grupoNumero: null, miembros: [], marcas: {} };
    document.getElementById("lista-content").innerHTML =
      `<div style="text-align:center;padding:32px;background:#E1F5EE;border-radius:12px;color:#085041;font-weight:500">
        ✓ Sesión guardada correctamente — ${alumnos.length} alumnos registrados
      </div>`;
    document.getElementById("grupo-select").value = "";

  } catch(e) {
    btn.disabled = false;
    btn.textContent = "Guardar sesión →";
    alert("Error al guardar: " + e.message);
  }
}

// ── HISTORIAL ─────────────────────────────────────────
function renderHistorial(filtroGrupo = "") {
  const el = document.getElementById("tab-historial");

  const registros = filtroGrupo
    ? state.asistencia.filter(r => String(r.grupoNumero) === String(filtroGrupo))
    : state.asistencia;

  const opcionesGrupo = `<option value="">Todos los grupos</option>` +
    state.grupos.map(g => `<option value="${g.ngrupoNumero}" ${filtroGrupo==g.ngrupoNumero?"selected":""}>Grupo ${g.ngrupoNumero} · ${g.idioma}</option>`).join("");

  if (registros.length === 0) {
    el.innerHTML = `
      <div class="historial-filtros">
        <select onchange="renderHistorial(this.value)">${opcionesGrupo}</select>
      </div>
      <div class="empty">No hay sesiones registradas todavía.</div>`;
    return;
  }

  // Agrupar por sesión (grupoNumero + fecha + hora)
  const sesiones = {};
  registros.forEach(r => {
    const key = `${r.grupoNumero}__${r.fecha}__${r.hora}`;
    if (!sesiones[key]) sesiones[key] = { grupoNumero: r.grupoNumero, fecha: r.fecha, hora: r.hora, alumnos: [] };
    sesiones[key].alumnos.push({ nombre: r.nombre, estatus: r.estatus });
  });

  const sesionesHTML = Object.entries(sesiones).reverse().map(([key, s]) => {
    const presentes = s.alumnos.filter(a=>a.estatus==="Presente"||a.estatus==="Tarde").length;
    const pct = Math.round(presentes/s.alumnos.length*100);
    const rows = s.alumnos.map(a =>
      `<div class="sesion-alumno">
        <span>${a.nombre}</span>
        <span class="est-tag est-${a.estatus}">${a.estatus}</span>
      </div>`
    ).join("");

    return `
      <div class="sesion-card">
        <div class="sesion-header" onclick="this.nextElementSibling.classList.toggle('open')">
          <div>
            <div class="sesion-titulo">Grupo ${s.grupoNumero} · ${s.fecha} ${s.hora}</div>
            <div class="sesion-meta">${s.alumnos.length} alumnos · ${pct}% asistencia</div>
          </div>
          <div class="sesion-badges">
            <span class="badge badge-ok">${presentes}/${s.alumnos.length} presentes</span>
          </div>
        </div>
        <div class="sesion-body">${rows}</div>
      </div>`;
  }).join("");

  // Estadísticas acumuladas por alumno
  const porAlumno = {};
  registros.forEach(r => {
    if (!porAlumno[r.nombre]) porAlumno[r.nombre] = { total:0, presentes:0 };
    porAlumno[r.nombre].total++;
    if (r.estatus==="Presente"||r.estatus==="Tarde") porAlumno[r.nombre].presentes++;
  });

  const statsHTML = Object.entries(porAlumno)
    .sort((a,b) => b[1].presentes/b[1].total - a[1].presentes/a[1].total)
    .map(([nombre, d]) => {
      const pct = Math.round(d.presentes/d.total*100);
      const color = pct>=80?"#534AB7":pct>=60?"#B87333":"#E24B4A";
      return `
        <div class="stat-alumno-row">
          <span style="font-size:13px">${nombre}</span>
          <div class="pct-bar-wrap"><div class="pct-bar" style="width:${pct}%;background:${color}"></div></div>
          <div class="pct-num" style="color:${color}">${pct}%</div>
        </div>`;
    }).join("");

  el.innerHTML = `
    <div class="historial-filtros">
      <select onchange="renderHistorial(this.value)">${opcionesGrupo}</select>
    </div>
    ${sesionesHTML}
    <div class="stats-alumno-table">
      <h4>Asistencia acumulada por alumno</h4>
      ${statsHTML}
    </div>`;
}

// ── ALERTAS ───────────────────────────────────────────
function renderAlertas() {
  const el = document.getElementById("tab-alertas");
  if (state.alertas.length === 0) {
    el.innerHTML = `<div class="empty">Sin alertas activas. Todos tienen buena asistencia. ✓</div>`;
    return;
  }
  el.innerHTML = `<div class="alertas-list">` +
    state.alertas.map(a => `
      <div class="alerta-item">
        <div class="alerta-avatar">${initials(a.nombre)}</div>
        <div class="alerta-info">
          <div class="alerta-nombre">${a.nombre}</div>
          <div class="alerta-detalle">Grupo ${a.grupoNumero} · ${a.email||""}</div>
        </div>
        <div class="alerta-badge">⚠ ${a.ausenciasConsecutivas} ausencias seguidas</div>
      </div>`).join("") +
    `</div>`;
}

// ── GENERAR GRUPOS ────────────────────────────────────
async function generarGrupos() {
  const btn  = document.getElementById("generar-btn");
  const spin = document.getElementById("gen-spin");
  btn.disabled = true;
  spin.style.display = "block";
  btn.lastChild.textContent = " Generando grupos...";

  try {
    const res  = await fetch("/api/generate-groups", { method: "POST" });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Error al generar grupos");
    await cargarDatos();
  } catch(e) {
    alert("Error: " + e.message);
    btn.disabled = false;
    spin.style.display = "none";
    btn.lastChild.textContent = " Generar grupos con IA";
  }
}
</script>
